version: "3.9"

services:
  backend:
    build: ./backend
    container_name: twinbrain-backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: twinbrain-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7.2
    container_name: twinbrain-redis
    ports:
      - "6379:6379"
