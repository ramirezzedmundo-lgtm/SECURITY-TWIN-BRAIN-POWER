version: '3.8'

services:
  # El Cerebro de Datos (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - twin-brain-network

  # El Vigía de Tráfico (Redis)
  cache:
    image: redis:7-alpine
    networks:
      - twin-brain-network

  # El Guerrero de IA (Tus 5 lenguajes integrados)
  backend:
    build: ./backend
    depends_on:
      - db
      - cache
    networks:
      - twin-brain-network

networks:
  twin-brain-network:
    driver: bridge

volumes:
  postgres_data:
